<!doctype html>
<html lang="bs">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sudoku</title>

<link rel="icon" href="sudoku.png">

<link rel="stylesheet" href="sudoku.css">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

</head>


<body>


<nav class="game-nav">

<button onclick="goBack()">
← Mini Games
</button>

</nav>




<!-- BACKGROUND -->

<div class="math-background">

<div class="formula f1">x²</div>
<div class="formula f2">sin(θ)</div>
<div class="formula f3">E=mc²</div>
<div class="formula f4">∞</div>
<div class="formula f5">π</div>
<div class="formula f6">Δ</div>
<div class="formula f7">∫</div>
<div class="formula f8">tan²(θ)</div>
<div class="formula f9">log₂(x)</div>
<div class="formula f10">a²+b²=c²</div>
<div class="formula f11">√x</div>
<div class="formula f12">cos(θ)</div>
<div class="formula f13">∑</div>

<div class="grid-lines"></div>

</div>







<div class="container">






<!-- ================= SETUP ================= -->


<section id="setup-screen" class="card">


<header class="hero-header">


<h1>

<span class="gradient-title">
Sudoku
</span>


<span class="gradient-title second">
Game
</span>


</h1>


</header>





<label>
👤 Ime igrača
</label>


<input

id="player-name"

type="text"

maxlength="24"

placeholder="Unesi ime igrača">





<label>
🎮 Izaberi težinu
</label>




<div class="levels">



<button class="level-tile easy" data-level="4">


<span>
🟢
</span>


<div>

<b>
Lako
</b>

<small>
4 × 4
</small>


</div>


</button>





<button class="level-tile medium" data-level="9easy">


<span>
🟡
</span>


<div>

<b>
Srednje
</b>

<small>
9 × 9 [Easy]
</small>


</div>


</button>






<button class="level-tile hard" data-level="9hard">


<span>
🔴
</span>


<div>

<b>
Teško
</b>
<small>
9 × 9 [Hard]
</small>


</div>


</button>




</div>





<p id="setup-feedback"></p>




<button id="start-btn" class="main-btn">

POČNI IGRU

</button>



</section>









<!-- ================= IGRA ================= -->



<section id="game-screen" class="card hidden">



<div class="game-top">


<h2 id="game-title">
Sudoku
</h2>



<div class="timer">

⏱

<span id="timer-display">
0s
</span>

</div>



</div>







<div id="board" class="sudoku-board">

</div>






<div id="numpad" class="numpad">

</div>






<div class="game-bottom">


❌ Greške:

<b id="mistakes">
0
</b>


</div>







<div class="buttons">

<button
class="main-btn"
onclick="newGame()">

 Nova igra🔄

</button>

</div>





<div id="message"></div>



</section>









<!-- ================= RANG LISTA ================= -->


<section class="card leaderboard">



<div class="leader-header">


<h2>
🏆 Rang lista
</h2>


<p>
Najbolji Sudoku rezultati
</p>


</div>





<div class="leader-tabs">



<button class="tab active" data-level="4">

🟢 4×4

</button>



<button class="tab" data-level="9easy">

🟡 9×9 Easy

</button>




<button class="tab" data-level="9hard">

🔴 9×9 Hard

</button>



</div>






<p id="lb-empty">

Još nema rezultata.

</p>





<ol id="lb-list">

</ol>






</section>








</div>

<div id="victory-overlay" class="victory-overlay">

    <div class="victory-box">


        <div class="victory-icon">
            🏆
        </div>


        <h1 id="victory-title">
            ČESTITAMO!
        </h1>


        <p id="victory-text">
        </p>


        <div id="victory-stats" class="victory-stats">

        </div>


        <div class="victory-buttons">


            <button 
            class="main-btn"
            onclick="closeVictory()">

                Nastavi

            </button>


        </div>


    </div>

</div>



<script src="sudoku.js"></script>


</body>

</html>
