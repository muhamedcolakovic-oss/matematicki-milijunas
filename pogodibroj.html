<!doctype html>
<html lang="bs">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pogodi broj</title>

<link rel="icon" type="image/png" href="pogodi-broj.png">

<link rel="stylesheet" href="pogodibroj.css">


<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">


</head>


<body>


<nav class="game-nav">

<button onclick="goBack()">

← Mini Games

</button>

</nav>





<!-- POZADINA -->


<div class="math-background">


<div class="formula f1">π</div>
<div class="formula f2">√x</div>
<div class="formula f3">∑</div>
<div class="formula f4">∞</div>
<div class="formula f5">x²</div>
<div class="formula f6">Δ</div>
<div class="formula f7">∫</div>
<div class="formula f8">a²+b²=c²</div>

<div class="formula f9">tan²(θ)</div>
<div class="formula f10">log₂(x)</div>
<div class="formula f11">sin(θ)</div>
<div class="formula f12">cos(θ)</div>
<div class="formula f13">∂f/∂x</div>
<div class="formula f14">E=mc²</div>
<div class="formula f15">φ</div>
<div class="formula f16">Γ(n)</div>
<div class="formula f17">Σ n²</div>
<div class="formula f18">√(a²+b²)</div>
<div class="formula f19">x³+y³</div>


<div class="grid-lines"></div>


</div>






<div class="container">






<!-- ================= START IGRE ================= -->


<section id="setup-screen" class="card">



<header class="hero-header">


<h1>

<span class="gradient-title">
Pogodi
</span>


<span class="gradient-title second">
Broj
</span>


</h1>


</header>





<label>

👤 Ime igrača

</label>


<input

id="player-name"

type="text"

maxlength="24"

placeholder="Unesi ime igrača">







<label>

🎮 Izaberi težinu

</label>




<div class="levels">



<button class="level-tile easy" data-level="25">


<span>
🟢
</span>


<div>

<b>
Lako
</b>
<small> 
</small>
<small>
Interval brojeva: [1 - 25]
</small>
</div>


</button>





<button class="level-tile medium" data-level="100">


<span>
🟡
</span>


<div>

<b>
Srednje
</b>

<small>
Interval brojeva: [1 - 100]
</small>


</div>


</button>





<button class="level-tile hard" data-level="1000">


<span>
🔴
</span>


<div>

<b>
Teško
</b>

<small>
Interval brojeva: [1 - 1000]
</small>


</div>


</button>



</div>





<p id="setup-feedback"></p>





<button id="start-btn" class="main-btn">

POČNI IGRU

</button>



</section>









<!-- ================= IGRA ================= -->



<section id="game-screen" class="card hidden">





<div class="game-top">



<h2 id="game-range-title">

</h2>




<div class="timer">

⏱

<span id="timer-display">
0s
</span>


</div>



</div>





<p>

Pogodi skriveni broj. Nakon svakog pokušaja dobijaš pomoć.

</p>





<div class="guess-box">


<input

id="guess-input"

type="number"

placeholder="Unesi broj">



<button id="guess-btn">

Pogodi

</button>


</div>







<div class="attempt-box">


<div id="attempts-display">

Pokušaji: 0

</div>


</div>






<div id="feedback"></div>






<h3>

📌 Historija pokušaja

</h3>



<div id="history"></div>






<button

id="new-game-btn"

class="main-btn hidden">


Nova igra


</button>





</section>









<!-- ================= RANG LISTA ================= -->



<section class="card leaderboard">





<div class="leader-header">


<h2>

🏆 Rang lista

</h2>


<p>

Najbolji rezultati po težini

</p>


</div>







<div class="leader-tabs">



<button 
class="tab active"
data-level="25">

🟢 Lako

</button>





<button

class="tab"

data-level="100">

🟡 Srednje

</button>





<button

class="tab"

data-level="1000">

🔴 Teško

</button>



</div>







<p id="lb-empty">

Još nema rezultata.

</p>





<ol id="lb-list"></ol>





</section>






</div>


<div id="victory-overlay" class="victory-overlay">
<div class="confetti"></div>
    <div class="victory-card">

        <div class="victory-icon">
            🏆
        </div>

        <h1 id="victory-title">
            ČESTITAMO!
        </h1>

        <p id="victory-text"></p>

        <div id="victory-stats" class="victory-stats">

        </div>

        <div class="victory-buttons">

            <button class="main-btn" onclick="closeVictory()">
                Nastavi
            </button>

        </div>

    </div>

</div>




<script src="pogodibroj.js"></script>
</body>

</html>
